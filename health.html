<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Muskan AI — Vibrant Health Coach with Voice & Graphics</title>
    <!-- Google Fonts & jQuery -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef2fb 0%, #f0f5fe 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .fullscreen-chat {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 0% 0%, #ffecd2 0%, #fcb69f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.4s ease;
            overflow: hidden;
        }
        
        .fullscreen-chat::before {
            content: '';
            position: absolute;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(255,215,150,0.5) 0%, transparent 70%);
            border-radius: 50%;
            top: -100px;
            left: -100px;
            animation: floatBubble 18s infinite ease-in-out;
        }
        
        .fullscreen-chat::after {
            content: '';
            position: absolute;
            width: 450px;
            height: 450px;
            background: radial-gradient(circle, rgba(255,180,120,0.4) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            animation: floatBubble 22s infinite reverse ease-in-out;
        }
        
        #particlesCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        
        @keyframes floatBubble {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 30px) scale(1.15); }
        }

        .chat-card {
            background: rgba(255,255,255,0.97);
            backdrop-filter: blur(24px);
            width: 560px;
            max-width: 90%;
            border-radius: 64px;
            box-shadow: 0 40px 70px -20px rgba(0,0,0,0.3);
            padding: 2.2rem 2rem;
            text-align: center;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(255,215,150,0.6);
        }

        .chat-card h2 {
            font-size: 2.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #c0392b, #e67e22, #f39c12, #27ae60);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
        }
        
        .leaf-icon {
            display: inline-block;
            animation: leafWave 3s infinite ease;
        }
        
        @keyframes leafWave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(12deg); }
            75% { transform: rotate(-6deg); }
        }

        .chat-sub {
            color: #7f8c8d;
            margin-bottom: 2rem;
            font-size: 0.95rem;
            font-weight: 500;
            background: #fff3e0;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 40px;
        }

        .chat-question {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.8rem;
            min-height: 85px;
            background: linear-gradient(120deg, #2c3e50, #e67e22);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .chat-options {
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            margin-bottom: 1rem;
        }

        .chat-option {
            background: linear-gradient(135deg, #ffffff, #fef9f0);
            border: 1px solid #ffd89a;
            padding: 12px 28px;
            border-radius: 80px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            color: #d35400;
        }

        .chat-option:hover {
            background: linear-gradient(135deg, #ffecd2, #ffe0b5);
            border-color: #f39c12;
            transform: translateY(-3px);
            color: #e67e22;
        }

        .chat-input {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .chat-input input {
            padding: 14px 24px;
            border-radius: 80px;
            border: 2px solid #ffe0b5;
            background: white;
            width: 220px;
            font-size: 1rem;
            outline: none;
            text-align: center;
        }

        .chat-input input:focus {
            border-color: #f39c12;
            box-shadow: 0 0 0 4px rgba(243,156,18,0.2);
        }

        .chat-input button {
            background: linear-gradient(135deg, #e67e22, #d35400);
            border: none;
            color: white;
            border-radius: 80px;
            padding: 0 32px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .chat-input button:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #f39c12, #e67e22);
        }

        .error-msg {
            color: #e74c3c;
            font-size: 0.8rem;
            margin-top: 12px;
            font-weight: 600;
        }

        .voice-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            border: none;
            color: white;
            border-radius: 80px;
            padding: 12px 28px;
            margin-top: 20px;
            cursor: pointer;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s;
        }
        
        .voice-btn:hover {
            transform: scale(1.05);
        }
        
        .voice-btn.listening {
            animation: pulseMic 1.2s infinite;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
        }
        
        @keyframes pulseMic {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231,76,60,0.6); }
            70% { transform: scale(1.08); box-shadow: 0 0 0 15px rgba(231,76,60,0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(231,76,60,0); }
        }

        .loading-animation {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
        }
        
        .rainbow-loader {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .rainbow-loader span {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            animation: bounceColor 0.6s infinite alternate;
        }
        
        .rainbow-loader span:nth-child(1) { background: #e74c3c; animation-delay: 0s; }
        .rainbow-loader span:nth-child(2) { background: #f39c12; animation-delay: 0.15s; }
        .rainbow-loader span:nth-child(3) { background: #2ecc71; animation-delay: 0.3s; }
        .rainbow-loader span:nth-child(4) { background: #3498db; animation-delay: 0.45s; }
        
        @keyframes bounceColor {
            0% { transform: translateY(0px); opacity: 0.5; }
            100% { transform: translateY(-20px); opacity: 1; }
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #ffe0b5;
            border-top: 5px solid #e67e22;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .dashboard-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.5rem 4rem;
            display: none;
            opacity: 0;
        }

        .floating-chat {
            position: fixed;
            bottom: 25px;
            right: 25px;
            z-index: 999;
            background: rgba(255,255,245,0.98);
            backdrop-filter: blur(20px);
            border-radius: 36px;
            box-shadow: 0 25px 45px -10px rgba(0,0,0,0.25);
            width: 340px;
            display: none;
            flex-direction: column;
            border: 2px solid rgba(243,156,18,0.4);
        }

        .floating-header {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
            padding: 14px 20px;
            border-radius: 34px 34px 20px 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
        }

        .floating-body {
            padding: 15px;
            max-height: 360px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fffef7;
        }

        .chat-message {
            border-radius: 24px;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 500;
            max-width: 95%;
            word-wrap: break-word;
        }

        .chat-message.bot {
            background: linear-gradient(135deg, #fff3e0, #ffe9cc);
            border-left: 4px solid #f39c12;
            color: #a04000;
        }

        .chat-message.user {
            background: linear-gradient(135deg, #e8f0fe, #d4e4fc);
            align-self: flex-end;
            color: #1e3799;
        }

        .floating-input-area {
            display: flex;
            border-top: 1px solid #e2e8f0;
            padding: 10px;
            gap: 8px;
        }

        .floating-input-area input {
            flex: 1;
            border: 1px solid #cbd5e1;
            border-radius: 40px;
            padding: 8px 12px;
            font-size: 0.8rem;
            outline: none;
        }

        .floating-input-area button {
            background: #f39c12;
            border: none;
            color: white;
            border-radius: 30px;
            padding: 0 14px;
            font-weight: bold;
            cursor: pointer;
        }

        .floating-voice {
            background: #f0f2f5;
            border: none;
            border-radius: 30px;
            padding: 0 12px;
            cursor: pointer;
            font-size: 1rem;
        }

        .section-card {
            background: linear-gradient(115deg, #ffffff, #fffaf5);
            border-radius: 40px;
            padding: 1.9rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 35px -12px rgba(243,156,18,0.15);
            transition: all 0.4s;
            border: 1px solid rgba(243,156,18,0.3);
            position: relative;
            overflow: hidden;
        }
        
        .section-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(180deg, #f39c12, #e67e22);
        }
        
        .section-card:hover {
            transform: translateY(-6px);
        }

        .section-title {
            font-size: 1.75rem;
            font-weight: 800;
            margin-bottom: 1.3rem;
            color: #d35400;
            border-left: 7px solid #f39c12;
            padding-left: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .health-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 22px;
            justify-content: space-between;
        }

        .stat-item {
            background: linear-gradient(145deg, #fff3e8, #fffaf2);
            border-radius: 32px;
            padding: 1.2rem 1.2rem;
            flex: 1;
            min-width: 130px;
            text-align: center;
            border: 1px solid #ffe0b5;
        }
        
        .stat-item strong {
            color: #e67e22;
            font-size: 1.1rem;
        }

        .progress-bar-bg {
            background: #fdebd0;
            border-radius: 30px;
            height: 16px;
            width: 100%;
            overflow: hidden;
            margin: 15px 0 8px;
        }
        
        .progress-fill {
            background: linear-gradient(90deg, #f39c12, #e67e22);
            width: 0%;
            height: 100%;
            border-radius: 30px;
            transition: width 0.45s ease;
        }
        
        .water-controls {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            align-items: center;
            justify-content: center;
        }
        
        button.small-btn {
            background: #fef2e6;
            border: 1px solid #f39c12;
            padding: 8px 24px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            color: #d35400;
        }
        
        button.small-btn:hover {
            background: #f39c12;
            color: white;
        }
        
        .quote-text {
            font-style: italic;
            font-size: 1.2rem;
            color: #c0392b;
            line-height: 1.45;
            background: #fff7e5;
            padding: 18px;
            border-radius: 36px;
            border-left: 6px solid #f1c40f;
            font-weight: 500;
        }
        
        .weekly-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(105px, 1fr));
            gap: 14px;
        }
        
        .day-card {
            background: linear-gradient(135deg, #fff8f0, #fff4e8);
            border-radius: 28px;
            padding: 12px 6px;
            text-align: center;
            border: 1px solid #ffddb0;
            font-weight: 600;
        }
        
        .day-card strong {
            color: #e67e22;
        }
        
        ul li {
            margin: 12px 0;
            font-weight: 500;
            color: #2c3e50;
            list-style: none;
        }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<canvas id="particlesCanvas"></canvas>

<div id="fullscreenChat" class="fullscreen-chat">
    <div class="chat-card">
        <h2><span class="leaf-icon">🌿</span> Muskan AI <span class="leaf-icon">✨🎨</span></h2>
        <div class="chat-sub">vibrant health coach · voice & graphics</div>
        <div id="chatQuestion" class="chat-question">Let's begin. What is your age?</div>
        <div id="chatOptionsArea" class="chat-options"></div>
        <div id="chatInputArea" class="chat-input hidden">
            <input type="number" id="chatInputField" placeholder="Enter value...">
            <button id="chatSubmitBtn">Continue →</button>
        </div>
        <div id="chatError" class="error-msg"></div>
        <button id="voiceInputBtn" class="voice-btn">🎤 Voice Input</button>
    </div>
</div>

<div id="dashboard" class="dashboard-container"></div>

<div id="floatingChat" class="floating-chat">
    <div class="floating-header">
        <span>💬 Muskan Assistant 🎤✨</span>
        <span id="toggleChat">−</span>
    </div>
    <div id="floatingBody" class="floating-body">
        <div class="chat-message bot">Hi! I'm Muskan, ask me anything. Click mic to speak! 🎤🌈</div>
    </div>
    <div class="floating-input-area">
        <input type="text" id="floatQuestion" placeholder="Ask me...">
        <button id="floatVoiceBtn" class="floating-voice">🎤</button>
        <button id="floatSend">Send</button>
    </div>
</div>

<script>
    // Particle background
    const canvas = document.getElementById('particlesCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 5 + 2;
            this.speedX = (Math.random() - 0.5) * 0.6;
            this.speedY = (Math.random() - 0.5) * 0.6;
            this.color = `hsl(${Math.random() * 60 + 20}, 80%, 65%)`;
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            if (this.x < 0) this.x = canvas.width;
            if (this.x > canvas.width) this.x = 0;
            if (this.y < 0) this.y = canvas.height;
            if (this.y > canvas.height) this.y = 0;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = this.color;
            ctx.fill();
        }
    }
    
    function initParticles() {
        particles = [];
        for (let i = 0; i < 70; i++) particles.push(new Particle());
    }
    
    function animateParticles() {
        if (!ctx) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animateParticles);
    }
    
    window.addEventListener('resize', () => { resizeCanvas(); initParticles(); });
    resizeCanvas();
    initParticles();
    animateParticles();
    
    // Voice Synthesis
    let synth = window.speechSynthesis;
    function speakText(text) {
        if (!synth) return;
        let utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'en-US';
        utterance.rate = 0.95;
        utterance.pitch = 1.1;
        synth.cancel();
        synth.speak(utterance);
    }
    
    function playBeep() {
        try {
            let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 960;
            gain.gain.value = 0.08;
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.2);
            osc.stop(audioCtx.currentTime + 0.2);
            audioCtx.resume();
        } catch(e) {}
    }
    
    // Voice Recognition
    let recognition = null;
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        let SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;
        recognition.lang = 'en-US';
    }
    
    function startVoiceInput(callback) {
        if (!recognition) { alert("Voice support: Use Chrome/Edge."); return; }
        playBeep();
        recognition.start();
        $('.voice-btn, .floating-voice').addClass('listening');
        recognition.onresult = (event) => {
            let transcript = event.results[0][0].transcript;
            playBeep();
            $('.voice-btn, .floating-voice').removeClass('listening');
            if (callback) callback(transcript);
        };
        recognition.onerror = () => { $('.voice-btn, .floating-voice').removeClass('listening'); };
        recognition.onend = () => { $('.voice-btn, .floating-voice').removeClass('listening'); };
    }
    
    // User Profile
    let userProfile = { age: null, gender: null, heightCm: null, weightKg: null, goal: null, activity: null };
    let step = 0;
    let stepsList = ['age', 'gender', 'height', 'weight', 'goal', 'activity'];
    
    const chatQuestionDiv = $('#chatQuestion');
    const chatOptionsArea = $('#chatOptionsArea');
    const chatInputArea = $('#chatInputArea');
    const chatError = $('#chatError');
    const fullscreenChat = $('#fullscreenChat');
    const dashboardDiv = $('#dashboard');
    const floatingChatDiv = $('#floatingChat');
    
    function showNumberInput(placeholderText) {
        chatOptionsArea.empty();
        chatInputArea.removeClass('hidden');
        const inputField = $('#chatInputField');
        inputField.val('');
        inputField.attr('placeholder', placeholderText);
        inputField.focus();
        $('#chatSubmitBtn').off('click').on('click', () => {
            let val = inputField.val().trim();
            if (!val) { chatError.text('Please enter a value.'); return; }
            let num = parseFloat(val);
            if (isNaN(num) || num <= 0) { chatError.text('Valid positive number.'); return; }
            saveResponse(num);
        });
    }
    
    function showOptions(opts) {
        chatInputArea.addClass('hidden');
        chatOptionsArea.empty();
        opts.forEach(opt => {
            let btn = $('<div class="chat-option">').text(opt).on('click', () => saveResponse(opt));
            chatOptionsArea.append(btn);
        });
    }
    
    function saveResponse(value) {
        userProfile[stepsList[step]] = value;
        step++;
        renderStep();
    }
    
    function renderStep() {
        chatError.text('');
        if (step >= stepsList.length) {
            showLoadingAndTransition();
            return;
        }
        let field = stepsList[step];
        if (field === 'age') { chatQuestionDiv.html("📍 What is your age?"); showNumberInput("e.g., 28"); speakText("What is your age?"); }
        else if (field === 'gender') { chatQuestionDiv.html("📍 Select your gender"); showOptions(['Female', 'Male', 'Other']); speakText("Please select your gender."); }
        else if (field === 'height') { chatQuestionDiv.html("📍 Height in cm?"); showNumberInput("e.g., 165 cm"); speakText("What is your height in centimeters?"); }
        else if (field === 'weight') { chatQuestionDiv.html("📍 Weight in kg?"); showNumberInput("e.g., 65 kg"); speakText("What is your weight in kilograms?"); }
        else if (field === 'goal') { chatQuestionDiv.html("📍 What is your health goal?"); showOptions(['Weight loss', 'Muscle gain', 'Maintenance']); speakText("What is your health goal?"); }
        else if (field === 'activity') { chatQuestionDiv.html("📍 Activity level?"); showOptions(['Sedentary', 'Light', 'Moderate', 'Active', 'Very Active']); speakText("What is your daily activity level?"); }
    }
    
    function showLoadingAndTransition() {
        chatOptionsArea.empty();
        chatInputArea.addClass('hidden');
        chatQuestionDiv.html(`<div class="loading-animation"><div class="spinner"></div><div class="rainbow-loader"><span></span><span></span><span></span><span></span></div><div style="color:#e67e22; font-weight:bold;">Analyzing your health...</div><div style="font-size:0.85rem;">✨ Creating vibrant plan ✨</div></div>`);
        speakText("Analyzing your health data. Please wait.");
        setTimeout(() => {
            fullscreenChat.fadeOut(600, () => {
                dashboardDiv.css('display', 'block').css('opacity', 0);
                dashboardDiv.fadeTo(500, 1, function() {
                    generateDashboardAndShow();
                    floatingChatDiv.css('display', 'flex').hide().fadeIn(550);
                    speakText("Welcome to Muskan AI. Your dashboard is ready!");
                });
            });
        }, 2800);
    }
    
    function generateDashboardAndShow() {
        const heightM = userProfile.heightCm / 100;
        const bmi = (userProfile.weightKg / (heightM * heightM)).toFixed(1);
        let bmiCategory = bmi < 18.5 ? 'Underweight' : (bmi < 25 ? 'Healthy weight' : (bmi < 30 ? 'Overweight' : 'Obese'));
        const idealMin = (18.5 * (heightM * heightM)).toFixed(1);
        const idealMax = (24.9 * (heightM * heightM)).toFixed(1);
        let bmr = (userProfile.gender === 'Female') ? 10 * userProfile.weightKg + 6.25 * userProfile.heightCm - 5 * userProfile.age - 161 : 10 * userProfile.weightKg + 6.25 * userProfile.heightCm - 5 * userProfile.age + 5;
        let actMap = { 'Sedentary':1.2, 'Light':1.375, 'Moderate':1.55, 'Active':1.725, 'Very Active':1.9 };
        let dailyCalories = Math.round(bmr * (actMap[userProfile.activity] || 1.2));
        let adjustedCal = dailyCalories;
        let goalSuffix = "";
        if (userProfile.goal === 'Weight loss') { adjustedCal = Math.max(1300, dailyCalories - 400); goalSuffix = " (deficit)"; }
        else if (userProfile.goal === 'Muscle gain') { adjustedCal = dailyCalories + 300; goalSuffix = " (surplus)"; }
        
        const dietOptions = { 
            'Weight loss':'🍳 Breakfast: Oats upma<br>🥗 Lunch: Quinoa salad + tofu<br>🍎 Snack: Greek yogurt<br>🌙 Dinner: Veg soup', 
            'Muscle gain':'🍳 Breakfast: Paneer paratha + eggs<br>🥗 Lunch: Chicken + rice<br>🍎 Snack: Peanut butter sandwich<br>🌙 Dinner: Fish curry', 
            'Maintenance':'🍳 Breakfast: Moong dal chilla<br>🥗 Lunch: Brown rice + dal<br>🍎 Snack: Roasted chana<br>🌙 Dinner: Khichdi' 
        };
        const workoutMap = { 
            'Weight loss':'🚴 Cardio 30min + Bodyweight circuit 3x15 (squats, pushups, planks)', 
            'Muscle gain':'🏋️ Strength: Bench press 4x8, Pull-ups 3x6, Leg press 4x10', 
            'Maintenance':'🧘 Yoga flow + Resistance bands (45min) + Light cardio' 
        };
        const daysList = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
        let acts = (userProfile.goal === 'Weight loss') ? ['🏃 Cardio','💪 Full body','🔥 HIIT','🧘 Yoga','🚴 Cardio','⚡ Strength','😌 Rest'] : 
                    (userProfile.goal === 'Muscle gain') ? ['💪 Chest/Tri','🏋️ Back/Bi','🦵 Legs','🏋️ Shoulders','💪 Upper','🦵 Lower','🧘 Recovery'] : 
                    ['🧘 Yoga','🚶‍♀️ Walk','🤸 Pilates','💪 Strength','🚴 Cardio','🧘 Stretch','😌 Rest'];
        
        let dashboardHtml = `
            <div class="section-card"><div class="section-title">🧾 Health Summary</div><div class="health-grid"><div class="stat-item"><strong>BMI</strong><br>${bmi} · ${bmiCategory}</div><div class="stat-item"><strong>Ideal Weight</strong><br>${idealMin}–${idealMax} kg</div><div class="stat-item"><strong>Daily Energy</strong><br>${adjustedCal} kcal${goalSuffix}</div></div></div>
            <div class="section-card"><div class="section-title">🌅 Daily Routine</div><ul><li>🌞 Wake: 6:30 AM</li><li>🏋️ Workout: 7:30 AM</li><li>🍳 Breakfast: 8:30 AM</li><li>🥗 Lunch: 12:45 PM</li><li>🍎 Snack: 4:30 PM</li><li>🍛 Dinner: 7:15 PM</li><li>😴 Sleep: 10:30 PM</li></ul></div>
            <div class="section-card"><div class="section-title">🥗 Diet Plan (Indian)</div><div>${dietOptions[userProfile.goal] || dietOptions['Maintenance']}</div></div>
            <div class="section-card"><div class="section-title">💪 Workout Plan</div><div>${workoutMap[userProfile.goal] || workoutMap['Maintenance']}</div></div>
            <div class="section-card"><div class="section-title">💧 Hydration Tracker</div><div><p>💧 Goal: 8 glasses/day</p><div class="progress-bar-bg"><div id="waterFill" class="progress-fill"></div></div><div style="text-align:center;"><span id="waterCount">0</span>/8</div><div class="water-controls"><button id="addWater" class="small-btn">💧 +1 Glass</button><button id="resetWater" class="small-btn">⟳ Reset</button></div></div></div>
            <div class="section-card"><div class="section-title">📅 Weekly Routine</div><div class="weekly-grid">${daysList.map((d,i)=>`<div class="day-card"><strong>${d}</strong><br>${acts[i]}</div>`).join('')}</div></div>
            <div class="section-card"><div class="section-title">✨ Motivation & Tip</div><div class="quote-text">“Small steps every day create big health transformations.” 🌟</div><br><div>💡 Tip: Stay consistent, and celebrate tiny wins! Drink water mindfully.</div></div>
        `;
        dashboardDiv.html(dashboardHtml);
        
        let water = 0;
        $('#addWater').on('click', () => { if(water<8){ water++; $('#waterCount').text(water); $('#waterFill').css('width', (water/8)*100+'%'); speakText(`You've had ${water} glasses of water.`); } });
        $('#resetWater').on('click', () => { water=0; $('#waterCount').text(0); $('#waterFill').css('width', '0%'); });
        
        $('.section-card').each(function(i) {
            $(this).css({opacity: 0, transform: 'translateY(30px)'});
            setTimeout(() => {
                $(this).animate({opacity: 1, transform: 'translateY(0px)'}, 500);
            }, i * 100);
        });
    }
    
    // Floating Chat Functions
    function addFloatingMessage(text, isUser = false) {
        let cls = isUser ? 'user' : 'bot';
        $('#floatingBody').append($('<div class="chat-message">').addClass(cls).text(text));
        $('#floatingBody').scrollTop($('#floatingBody')[0].scrollHeight);
        if (!isUser) speakText(text);
    }
    
    function handleFloatingQuery(q) {
        let lower = q.toLowerCase();
        if (lower.includes('bmi')) { 
            let bmiVal = (userProfile.weightKg / ((userProfile.heightCm/100)**2)).toFixed(1); 
            addFloatingMessage(`Your BMI is ${bmiVal}.`, false); 
        } else if (lower.includes('calorie') || lower.includes('calories')) { 
            addFloatingMessage(`Your daily calorie need is based on your profile. Check the Health Summary section!`, false); 
        } else if (lower.includes('water')) { 
            addFloatingMessage(`Use the Hydration Tracker to log your water intake! 🚰`, false); 
        } else { 
            addFloatingMessage(`I'm Muskan! Check your dashboard for diet, workout, and wellness tips. Stay healthy! 🌿`, false); 
        }
    }
    
    // Event Listeners
    $('#voiceInputBtn').on('click', () => startVoiceInput((text) => { $('#chatInputField').val(text); $('#chatSubmitBtn').click(); }));
    $('#floatVoiceBtn').on('click', () => startVoiceInput((text) => { $('#floatQuestion').val(text); $('#floatSend').click(); }));
    $('#floatSend').on('click', () => { let q = $('#floatQuestion').val().trim(); if(q) { addFloatingMessage(q, true); handleFloatingQuery(q); $('#floatQuestion').val(''); } });
    $('#floatQuestion').on('keypress', (e) => { if(e.which === 13) $('#floatSend').click(); });
    
    let expanded = true;
    $('#toggleChat').on('click', () => { 
        if(expanded) { $('#floatingBody, .floating-input-area').slideUp(); $('#toggleChat').text('+'); } 
        else { $('#floatingBody, .floating-input-area').slideDown(); $('#toggleChat').text('−'); } 
        expanded = !expanded; 
    });
    
    // Start the onboarding
    renderStep();
    speakText("Welcome to Muskan AI");
</script>
</body>
</html>
